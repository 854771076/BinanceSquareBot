name: Test BinanceSquareBot

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source to test (e.g., followin)"
        type: string
        default: "followin"
      args:
        description: "Additional arguments (e.g., xxx)"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  test-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Create data and logs directories
        run: |
          mkdir -p data logs

      - name: Run test with dry-run
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LOG_LEVEL: DEBUG
          FOLLOWIN_SOURCE_ENABLED: true
        run: |
          poetry run binance-square-bot ${{ github.event.inputs.source }} ${{ github.event.inputs.args }} --dry-run
